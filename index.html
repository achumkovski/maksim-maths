<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maksim's Maths</title>
  <script>
    // Force fresh JS load when app version changes, bypassing Chrome cache
    var APP_V = '6';
    if (localStorage.getItem('mm-code-v') !== APP_V) {
      localStorage.setItem('mm-code-v', APP_V);
      var u = new URL(location.href);
      u.searchParams.set('_v', APP_V);
      location.replace(u.toString());
    }
  </script>
  <link rel="stylesheet" href="styles.css?v=6" />
</head>
<body>
  <div id="app">
    <div class="topbar" id="topbar">
      <div class="topbar-logo">📐 Maksim's Maths</div>
      <div class="topbar-right">
        <span id="topbar-subtitle" class="text-muted text-sm"></span>
        <button class="btn btn-ghost btn-sm" id="sync-cloud-btn" title="Sync from cloud" style="display:none">☁️</button>
        <button class="btn btn-ghost btn-sm" id="change-key-btn" title="Change API key">🔑</button>
      </div>
    </div>

    <div id="view-container"></div>
  </div>

  <div class="modal-overlay" id="modal-overlay"></div>

  <script src="curriculum.js?v=5"></script>
  <script src="db.js?v=5"></script>
  <script src="claude.js?v=5"></script>
  <script src="app.js?v=5"></script>
</body>
</html>
